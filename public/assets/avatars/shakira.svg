<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e8880a"/>
      <stop offset="100%" stop-color="#3a0a00"/>
    </radialGradient>
    <radialGradient id="face" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e4ac7c"/>
      <stop offset="100%" stop-color="#c89060"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="100" cy="100" r="99"/></clipPath>
  </defs>

  <g clip-path="url(#circle)">
    <!-- background -->
    <rect width="200" height="200" fill="url(#bg)"/>

    <!-- hair back layer -->
    
    <path d="M 46 90 C 6 96 4 166 18 200 L 182 200 C 196 166 194 96 154 90 C 134 70 100 60 100 60 C 100 60 66 70 46 90 Z" fill="#c8a020"/>
    <path d="M 18 132 C 4 118 4 142 14 155 C 8 145 10 131 18 132 Z" fill="#c8a020" opacity="0.9"/>
    <path d="M 182 132 C 196 118 196 142 186 155 C 192 145 190 131 182 132 Z" fill="#c8a020" opacity="0.9"/>
    <path d="M 28 110 C 14 100 12 118 20 126 Z" fill="#c8a020" opacity="0.7"/>
    <path d="M 172 110 C 186 100 188 118 180 126 Z" fill="#c8a020" opacity="0.7"/>

    <!-- shoulders -->
    <ellipse cx="100" cy="208" rx="72" ry="52" fill="#aa7242"/>

    <!-- neck -->
    <rect x="88" y="140" width="24" height="38" rx="6" fill="url(#face)"/>

    <!-- head -->
    <ellipse cx="100" cy="112" rx="36" ry="40" fill="url(#face)"/>

    <!-- hair crown (over top of head) -->
    <path d="M 64 82 Q 100 65 136 82 Q 120 72 100 70 Q 80 72 64 82 Z" fill="#c8a020" opacity="0.85"/>

    <!-- features -->
    <path d="M 81 102 Q 87 99 93 102" fill="none" stroke="#1a0808" stroke-width="2" stroke-linecap="round"/>
                 <path d="M 107 102 Q 113 99 119 102" fill="none" stroke="#1a0808" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="87" cy="109" rx="5" ry="4" fill="#1a0808"/>
                <circle cx="88.5" cy="107.5" r="1.2" fill="white" opacity="0.7"/>
    <ellipse cx="113" cy="109" rx="5" ry="4" fill="#1a0808"/>
                <circle cx="114.5" cy="107.5" r="1.2" fill="white" opacity="0.7"/>
    <ellipse cx="100" cy="120" rx="3" ry="2" fill="#c89060" stroke="#00000020" stroke-width="1"/>
    <path d="M 89 130 Q 100 137 111 130 Q 100 140 89 130 Z" fill="#dd2200"/>
                 <path d="M 89 130 Q 100 127 111 130" fill="none" stroke="#dd2200" stroke-width="1.5"/>
    
  </g>

  <!-- gold border -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#f5a623" stroke-width="5" opacity="0.85"/>
  <circle cx="100" cy="100" r="93" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
</svg>