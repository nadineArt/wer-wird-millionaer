<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#88ccff"/>
      <stop offset="100%" stop-color="#0a1a44"/>
    </radialGradient>
    <radialGradient id="face" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff8d8"/>
      <stop offset="100%" stop-color="#f5dcbc"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="100" cy="100" r="99"/></clipPath>
  </defs>

  <g clip-path="url(#circle)">
    <!-- background -->
    <rect width="200" height="200" fill="url(#bg)"/>

    <!-- hair back layer -->
    
    <path d="M 60 86 C 36 90 30 138 36 200 L 164 200 C 170 138 164 90 140 86 C 124 75 110 70 100 70 C 90 70 76 75 60 86 Z" fill="#e0d890"/>
    <path d="M 60 86 C 50 72 100 58 140 86 Q 118 68 100 68 Q 82 68 60 86 Z" fill="#e0d890" opacity="0.7"/>

    <!-- shoulders -->
    <ellipse cx="100" cy="208" rx="72" ry="52" fill="#d7be9e"/>

    <!-- neck -->
    <rect x="88" y="140" width="24" height="38" rx="6" fill="url(#face)"/>

    <!-- head -->
    <ellipse cx="100" cy="112" rx="36" ry="40" fill="url(#face)"/>

    <!-- hair crown (over top of head) -->
    <path d="M 64 82 Q 100 65 136 82 Q 120 72 100 70 Q 80 72 64 82 Z" fill="#e0d890" opacity="0.85"/>

    <!-- features -->
    <path d="M 81 102 Q 87 99 93 102" fill="none" stroke="#1a0808" stroke-width="2" stroke-linecap="round"/>
                 <path d="M 107 102 Q 113 99 119 102" fill="none" stroke="#1a0808" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="87" cy="109" rx="5" ry="4" fill="#1a0808"/>
                <circle cx="88.5" cy="107.5" r="1.2" fill="white" opacity="0.7"/>
    <ellipse cx="113" cy="109" rx="5" ry="4" fill="#1a0808"/>
                <circle cx="114.5" cy="107.5" r="1.2" fill="white" opacity="0.7"/>
    <ellipse cx="100" cy="120" rx="3" ry="2" fill="#f5dcbc" stroke="#00000020" stroke-width="1"/>
    <path d="M 89 130 Q 100 137 111 130 Q 100 140 89 130 Z" fill="#cc4488"/>
                 <path d="M 89 130 Q 100 127 111 130" fill="none" stroke="#cc4488" stroke-width="1.5"/>
    
  </g>

  <!-- gold border -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#f5a623" stroke-width="5" opacity="0.85"/>
  <circle cx="100" cy="100" r="93" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
</svg>